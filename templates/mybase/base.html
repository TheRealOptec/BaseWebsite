<!DOCTYPE html>
{% load staticfiles %}
<html lang="en">
    <head>
        <!-- Meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- Bootstrap CDN -->
        <!-- Formatted like this to remove annoying horizontal scrollbar -->
        <!-- Got these from https://getbootstrap.com/ -->
        <!-- Note: we may want to embed Bootstrap as a node module into our webpage at a later date -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
            rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
            crossorigin="anonymous"
        >
        <!-- Required to use glyphicons -->
         <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
        <!-- The static CSS -->
        <link rel="stylesheet" href="{{static_css_path}}base.css">
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
        ></script>
        <title>This base website works!</title>
    </head>
    <body>
        <header>
            <div class="row">
                <!-- The logo -->
                <div class="col-sm-3">
                    <!-- TODO: change this logo (tihs is a temporary one for testing) -->
                    <div class="text-centre">
                        <h1><span class="bi-moon-stars-fill p-5"></span></h1>
                    </div>
                </div>
                <!-- The search bar -->
                <div class="col-sm-6">
                    <div class="input-group d-flex flex-row justify-content-center">
                        <!-- The search button -->
                        <button class="btn btn-primary btn-sm input-group-btn">
                            <span class="bi-search"></span>
                        </button>
                        <!-- The search field itself -->
                        <input type="search" placeholder="Search..."/>
                        <!-- The filter button -->
                        <button class="btn btn-secondary btn-sm">
                            <span class="bi-filter"></span>
                        </button>
                    </div>
                </div>
                <div class="col-sm-3">
                    Column 3
                </div>
            </div>
        </header>
    </body>
</html>
